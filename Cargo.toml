[package]
name = "bevy-vn"
version = "0.1.0"
edition = "2021"

[lib]
name = "bevy_vn"
path = "src/lib.rs"

[dependencies]
bevy = { version = "0.18", features = ["bevy_asset", "bevy_audio", "vorbis", "jpeg", "bevy_ui_render"] }
rodio = "0.20"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"
rand = "0.8"
#anyhow = "1"
bevy_scrollbar = "0.6"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[workspace]
members = ["tools/artemis-export"]

[profile.release]
opt-level = 3
lto = true
