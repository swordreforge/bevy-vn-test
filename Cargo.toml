[package]
name = "bevy-vn"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", features = ["bevy_asset", "bevy_audio", "vorbis"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"
anyhow = "1"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = true
